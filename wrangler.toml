name = "blog"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# Default (local dev)
# ============================================================

[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "local-dev-placeholder"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "blog-images"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/posts/*", "/tags/*", "/feed.xml", "/images/*", "/admin/*", "/favicon.ico"]

# ============================================================
# Production
# ============================================================

[env.production]
name = "blog"

[[env.production.d1_databases]]
binding = "DB"
database_name = "blog-db-prod"
# Set via: wrangler d1 create blog-db-prod
# Then paste the returned database_id here
database_id = "7f730221-094a-4f54-99f9-266ea79c5576"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "blog-images"

[env.production.assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/posts/*", "/tags/*", "/feed.xml", "/images/*", "/admin/*", "/favicon.ico"]

[[env.production.routes]]
pattern = "mrwuliu.top"
custom_domain = true
